<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Scout - Fort Worth Investment Properties</title>
    <style>
        :root { --bg: #0d1117; --bg2: #161b22; --border: #30363d; --text: #c9d1d9; --text2: #8b949e; --primary: #58a6ff; --accent: #d29922; --success: #3fb950; --danger: #f85149; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system,BlinkMacSystemFont,sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: var(--primary); }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .filters select, .filters input { padding: 8px 12px; background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; }
        .stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .stat { background: var(--bg2); padding: 15px 25px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text2); text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; background: var(--bg2); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--bg); color: var(--text2); font-weight: 600; font-size: 12px; text-transform: uppercase; }
        tr:hover { background: rgba(88,166,255,0.1); cursor: pointer; }
        .pass { color: var(--success); }
        .fail { color: var(--danger); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 1000; overflow-y: auto; }
        .modal.active { display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg2); border-radius: 12px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { font-size: 18px; color: var(--primary); }
        .close-btn { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; }
        .modal-body { padding: 20px; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .detail-card { background: var(--bg); padding: 12px; border-radius: 6px; border: 1px solid var(--border); }
        .detail-label { font-size: 11px; color: var(--text2); text-transform: uppercase; }
        .detail-value { font-size: 16px; font-weight: 600; margin-top: 4px; }
        .detail-value.sm { font-size: 12px; }
        .section-title { font-size: 14px; font-weight: 600; margin: 20px 0 10px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .analysis-section { background: var(--bg); border-radius: 6px; padding: 10px; margin-bottom: 10px; }
        .analysis-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .analysis-row:last-child { border-bottom: none; }
        .highlight { color: var(--success); font-weight: 600; }
        .negative { color: var(--danger); }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .action-btn.primary { background: var(--primary); color: var(--bg); }
        .action-btn.secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
        a { color: var(--primary); }
    </style>
</head>
<body>
    <h1>🏠 Property Scout - Fort Worth Investment Properties</h1>
    <div class="filters">
        <select id="statusFilter"><option value="all">All Status</option><option value="pass">Pass Only</option></select>
        <select id="sortBy"><option value="cashFlow">Sort by Cash Flow</option><option value="coc">Sort by CoC</option><option value="price">Sort by Price</option></select>
        <input type="number" id="maxPrice" placeholder="Max Price" style="width:120px">
    </div>
    <div class="stats">
        <div class="stat"><div class="stat-value" id="totalCount">0</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-value pass" id="passCount">0</div><div class="stat-label">Pass</div></div>
        <div class="stat"><div class="stat-value fail" id="avgCf">$0</div><div class="stat-label">Avg CF</div></div>
    </div>
    <table><thead><tr><th>Address</th><th>Price</th><th>Beds×Baths</th><th>Sqft</th><th>Type</th><th>CF</th><th>CoC</th><th>Status</th></tr></thead><tbody id="tableBody"></tbody></table>
    <div class="modal" id="propertyModal"><div class="modal-content"><div class="modal-header"><h2 id="modalTitle"></h2><button class="close-btn" onclick="closeModal()">×</button></div><div class="modal-body" id="modalBody"></div></div></div>
    <script>
    const properties = [
        {id:1,address:"7652 Colorado Creek Ct, Fort Worth, TX 76133",listed:212500,offer:180625,beds:5,baths:4,type:"DUPLEX",sqft:2400,cashFlow:540,coc:6.5,status:"pass",source:"zillow"},
        {id:2,address:"8812 Texas Risinger Way, Fort Worth, TX 76137",listed:235000,offer:199750,beds:4,baths:3,type:"SFR",sqft:2150,cashFlow:380,coc:4.6,status:"pass",source:"zillow"},
        {id:3,address:"7021 Crabtree Lane, Fort Worth, TX 76180",listed:245000,offer:208250,beds:4,baths:3,type:"SFR",sqft:1900,cashFlow:290,coc:3.5,status:"pass",source:"zillow"},
        {id:4,address:"6204 Brookside Dr, Fort Worth, TX 76180",listed:255000,offer:216750,beds:3,baths:2,type:"SFR",sqft:1650,cashFlow:180,coc:2.2,status:"pass",source:"zillow"},
        {id:5,address:"6461 Westridge Dr, Fort Worth, TX 76180",listed:265000,offer:225250,beds:4,baths:2,type:"SFR",sqft:1800,cashFlow:120,coc:1.4,status:"pass",source:"zillow"},
        {id:6,address:"609 Norwood Dr, Hurst, TX 76053",listed:275000,offer:233750,beds:3,baths:2,type:"SFR",sqft:1550,cashFlow:80,coc:1.0,status:"pass",source:"zillow"},
        {id:7,address:"816 Midcreek Dr, Euless, TX 76039",listed:285000,offer:242250,beds:4,baths:3,type:"SFR",sqft:2100,cashFlow:40,coc:0.5,status:"fail",source:"zillow"},
        {id:8,address:"6009 Deborah Ln, Fort Worth, TX 76180",listed:295000,offer:250750,beds:3,baths:2,type:"SFR",sqft:1450,cashFlow:-30,coc:-0.4,status:"fail",source:"zillow"},
    ];
    function formatMoney(n) { return '$' + n.toLocaleString(); }
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const statusFilter = document.getElementById('statusFilter').value;
        const sortBy = document.getElementById('sortBy').value;
        const maxPrice = parseInt(document.getElementById('maxPrice').value) || Infinity;
        let filtered = properties.filter(p => (statusFilter === 'all' || p.status === statusFilter) && p.listed <= maxPrice);
        filtered.sort((a,b) => b[sortBy] - a[sortBy]);
        tbody.innerHTML = filtered.map(p => `<tr onclick="showProperty(${p.id})"><td>${p.address}</td><td>${formatMoney(p.listed)}</td><td>${p.beds}×${p.baths}</td><td>${p.sqft}</td><td>${p.type}</td><td class="${p.cashFlow >= 0 ? 'pass':'fail'}">${formatMoney(p.cashFlow)}</td><td class="${p.coc >= 5 ? 'pass':p.coc > 0 ? '':'fail'}">${p.coc.toFixed(1)}%</td><td class="${p.status === 'pass' ? 'pass':'fail'}">${p.status === 'pass' ? '✅ PASS' : '❌ FAIL'}</td></tr>`).join('');
        document.getElementById('totalCount').textContent = filtered.length;
        document.getElementById('passCount').textContent = filtered.filter(p => p.status === 'pass').length;
        document.getElementById('avgCf').textContent = formatMoney(Math.round(filtered.reduce((a,b) => a + b.cashFlow, 0) / filtered.length || 0));
    }
    document.getElementById('statusFilter').onchange = renderTable;
    document.getElementById('sortBy').onchange = renderTable;
    document.getElementById('maxPrice').oninput = renderTable;
    
    // ============ ENHANCED MODAL WITH ALL CALCULATIONS ============
    function showProperty(id) {
        const p = properties.find(x => x.id === id);
        if (!p) return;
        
        // Core calculations
        const price = p.listed;
        const offer = p.offer;
        const sqft = p.sqft;
        const rent = sqft; // $1/sqft estimate
        const downPayment = 100000;
        const loanAmount = Math.max(0, offer - downPayment);
        const interestRate = 5.25 / 100;
        const monthlyRate = interestRate / 12;
        const nPayments = 30 * 12;
        const monthlyPI = loanAmount > 0 ? loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, nPayments)) / (Math.pow(1 + monthlyRate, nPayments) - 1) : 0;
        
        // Income
        const grossRent = rent;
        const vacancy = grossRent * 0.05;
        const effectiveGrossIncome = grossRent - vacancy;
        
        // Expenses (50% rule)
        const operatingExpenses = grossRent * 0.50;
        const capex = grossRent * 0.08;
        const totalExpenses = operatingExpenses + capex;
        
        // NOI
        const noi = effectiveGrossIncome - operatingExpenses;
        
        // Cash flow
        const debtService = monthlyPI;
        const btcf = noi - debtService;
        const cocReturn = downPayment > 0 ? (btcf * 12 / downPayment) * 100 : 0;
        
        // Valuation
        const arv = price * 1.05;
        const mao = (arv * 0.70) - (price * 0.10);
        const pricePerSqft = price / sqft;
        const onePercentRule = (rent / price) * 100;
        const grm = price / (rent * 12);
        const ltv = (loanAmount / price) * 100;
        
        // More metrics
        const oer = effectiveGrossIncome > 0 ? (operatingExpenses / effectiveGrossIncome) * 100 : 0;
        const noiMargin = effectiveGrossIncome > 0 ? (noi / effectiveGrossIncome) * 100 : 0;
        const capRate = price > 0 ? (noi / price) * 100 : 0;
        const propertyValue = noi > 0 && capRate > 0 ? noi / (capRate / 100) : price;
        
        // Debt metrics
        const annualDebt = debtService * 12;
        const dscr = annualDebt > 0 ? noi / annualDebt : 999;
        const debtYield = loanAmount > 0 ? (noi / loanAmount) * 100 : 999;
        const loanConstant = loanAmount > 0 ? (annualDebt / loanAmount) * 100 : 0;
        const ber = effectiveGrossIncome > 0 ? ((operatingExpenses + annualDebt) / effectiveGrossIncome) * 100 : 0;
        
        // Unlevered
        const unleveredCF = noi - capex;
        
        // Tax
        const landValue = price * 0.20;
        const buildingBasis = price - landValue;
        const annualDepreciation = buildingBasis / 27.5;
        const taxSavings = annualDepreciation * 0.22;
        
        // 5-Year Projections
        const rentGrowth = 0.03;
        const appreciation = 0.03;
        const year1CF = btcf * 12;
        const year5CF = btcf * 12 * Math.pow(1 + rentGrowth, 5);
        const cumulativeCF = btcf * 12 * 5;
        const equityBuild = loanAmount * 0.15;
        const year5Value = price * Math.pow(1 + appreciation, 5);
        const exitCapRate = 0.06;
        const year5Sale = (noi * 12 * Math.pow(1 + rentGrowth, 5)) / exitCapRate;
        const year5NetProceeds = year5Sale * 0.94 - loanAmount * 0.85;
        const total5yrReturn = cumulativeCF + year5NetProceeds - downPayment;
        const irr = Math.pow((total5yrReturn + downPayment) / downPayment, 0.2) - 1;
        const npv = total5yrReturn / Math.pow(1.1, 2.5);
        const yieldOnCost = noi * 12 / (price + price * 0.10) * 100;
        const equityMultiple = (cumulativeCF + year5NetProceeds + downPayment) / downPayment;
        const simpleROI = (cumulativeCF + (year5Value - price)) / downPayment * 100;
        const atcf = btcf + (taxSavings / 12);
        const capitalGain = year5Sale - buildingBasis - (year5Sale * 0.06);
        
        // Risk
        const breakEvenRent = (operatingExpenses + debtService);
        const occupancyBreakEven = (breakEvenRent / grossRent) * 100;
        
        // Crime data - mapped from address keywords
        const addressLower = p.address.toLowerCase();
        const crimeMap = {
            'colorado creek': {name:'Wedgwood',score:62,grade:'C+',crimes:245},
            'texas risinger': {name:'Wedgwood',score:62,grade:'C+',crimes:245},
            'crabtree': {name:'North Richland Hills',score:74,grade:'B',crimes:165},
            'brookside': {name:'Watauga',score:68,grade:'C+',crimes:195},
            'westridge': {name:'Watauga',score:68,grade:'C+',crimes:195},
            'norwood': {name:'Hurst',score:72,grade:'B',crimes:170},
            'midcreek': {name:'Euless',score:71,grade:'B',crimes:180},
            'deborah': {name:'Watauga',score:68,grade:'C+',crimes:195},
        };
        let safetyData = null;
        for (const [key, data] of Object.entries(crimeMap)) {
            if (addressLower.includes(key)) { safetyData = data; break; }
        }
        
        const cfClass = p.cashFlow >= 0 ? 'highlight' : 'negative';
        const statusHtml = p.status === 'pass' ? '<span style="color:var(--success)">✅ PASS</span>' : '<span style="color:var(--danger)">❌ FAIL</span>';
        
        document.getElementById('modalTitle').textContent = p.address;
        document.getElementById('modalBody').innerHTML = `
            <div class="detail-grid">
                <div class="detail-card"><div class="detail-label">Listed</div><div class="detail-value">${formatMoney(price)}</div></div>
                <div class="detail-card"><div class="detail-label">Offer Price</div><div class="detail-value">${formatMoney(offer)}</div></div>
                <div class="detail-card"><div class="detail-label">Type</div><div class="detail-value">${p.type}</div></div>
                <div class="detail-card"><div class="detail-label">Source</div><div class="detail-value sm">${p.source.toUpperCase()}</div></div>
            </div>
            <div class="detail-grid">
                <div class="detail-card"><div class="detail-label">Beds</div><div class="detail-value">${p.beds}</div></div>
                <div class="detail-card"><div class="detail-label">Baths</div><div class="detail-value">${p.baths}</div></div>
                <div class="detail-card"><div class="detail-label">Sq Ft</div><div class="detail-value">${sqft.toLocaleString()}</div></div>
                <div class="detail-card"><div class="detail-label">Est. Rent</div><div class="detail-value">${formatMoney(rent)}/mo</div></div>
            </div>
            
            <div class="section-title">📊 Valuation & Acquisition</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>ARV (After Repair Value)</span><span>${formatMoney(arv)}</span></div>
                <div class="analysis-row"><span>MAO (Max Allowable Offer)</span><span>${formatMoney(mao)}</span></div>
                <div class="analysis-row"><span>Price / Sq Ft</span><span>${formatMoney(pricePerSqft)}</span></div>
                <div class="analysis-row"><span>1% Rule</span><span>${onePercentRule.toFixed(2)}% ${onePercentRule >= 1 ? '✅' : '❌'}</span></div>
                <div class="analysis-row"><span>GRM (Gross Rent Mult)</span><span>${grm.toFixed(1)}</span></div>
                <div class="analysis-row"><span>LTV</span><span>${ltv.toFixed(1)}%</span></div>
            </div>
            
            <div class="section-title">💰 Income</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>Scheduled Gross Rent</span><span>${formatMoney(grossRent)}/mo</span></div>
                <div class="analysis-row"><span>Vacancy (5%)</span><span>-${formatMoney(vacancy)}/mo</span></div>
                <div class="analysis-row"><span>Effective Gross Income</span><span>${formatMoney(effectiveGrossIncome)}/mo</span></div>
            </div>
            
            <div class="section-title">📉 Expenses</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>Operating Expenses (50%)</span><span>${formatMoney(operatingExpenses)}/mo</span></div>
                <div class="analysis-row"><span>CapEx Reserves (8%)</span><span>${formatMoney(capex)}/mo</span></div>
                <div class="analysis-row"><span>OER</span><span>${oer.toFixed(1)}%</span></div>
                <div class="analysis-row"><span>NOI Margin</span><span>${noiMargin.toFixed(1)}%</span></div>
            </div>
            
            <div class="section-title">🏆 Core Profitability</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>NOI</span><span>${formatMoney(noi)}/mo</span></div>
                <div class="analysis-row"><span>Cap Rate</span><span>${capRate.toFixed(1)}%</span></div>
                <div class="analysis-row"><span>Property Value (Income)</span><span>${formatMoney(propertyValue)}</span></div>
            </div>
            
            <div class="section-title">🏦 Financing & Debt</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>Loan Amount</span><span>${formatMoney(loanAmount)}</span></div>
                <div class="analysis-row"><span>Monthly PI Payment</span><span>${formatMoney(monthlyPI)}/mo</span></div>
                <div class="analysis-row"><span>DSCR</span><span>${dscr.toFixed(2)} ${dscr >= 1.25 ? '✅' : '❌'}</span></div>
                <div class="analysis-row"><span>Debt Yield</span><span>${debtYield.toFixed(1)}%</span></div>
                <div class="analysis-row"><span>Loan Constant</span><span>${loanConstant.toFixed(1)}%</span></div>
                <div class="analysis-row"><span>Break-Even Ratio (BER)</span><span>${ber.toFixed(1)}%</span></div>
            </div>
            
            <div class="section-title">💵 Cash Flow & Returns</div>
            <div class="analysis-section">
                <div class="analysis-row ${cfClass}"><span>Unlevered Cash Flow</span><span>${formatMoney(unleveredCF)}/mo</span></div>
                <div class="analysis-row ${cfClass}"><span>BTCF (Before-Tax)</span><span>${formatMoney(btcf)}/mo</span></div>
                <div class="analysis-row ${cfClass}"><span>Cash on Cash</span><span>${cocReturn.toFixed(1)}%</span></div>
            </div>
            
            <div class="section-title">📐 Tax</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>Building Basis</span><span>${formatMoney(buildingBasis)}</span></div>
                <div class="analysis-row"><span>Annual Depreciation</span><span>${formatMoney(annualDepreciation)}/yr</span></div>
                <div class="analysis-row"><span>Tax Savings (22% bracket)</span><span>${formatMoney(taxSavings)}/yr</span></div>
            </div>
            
            <div class="section-title">🚪 Exit (5yr Projection)</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>Exit Cap Rate</span><span>6%</span></div>
                <div class="analysis-row"><span>Projected Sale Price</span><span>${formatMoney(year5Sale)}</span></div>
                <div class="analysis-row"><span>Net Sale Proceeds</span><span>${formatMoney(year5NetProceeds)}</span></div>
                <div class="analysis-row"><span>Total 5yr Return</span><span>${formatMoney(total5yrReturn)}</span></div>
            </div>
            
            <div class="section-title">📈 Advanced (5-Year)</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>Cumulative CF</span><span>${formatMoney(cumulativeCF)}</span></div>
                <div class="analysis-row"><span>Equity Build (5yr)</span><span>${formatMoney(equityBuild)}</span></div>
                <div class="analysis-row"><span>IRR</span><span style="color:${irr > 0.12 ? 'var(--success)':irr > 0.08 ? 'var(--accent)':'var(--danger)'}">${(irr * 100).toFixed(1)}%</span></div>
                <div class="analysis-row"><span>NPV (10% discount)</span><span>${formatMoney(npv)}</span></div>
                <div class="analysis-row"><span>Equity Multiple</span><span>${equityMultiple.toFixed(2)}x</span></div>
                <div class="analysis-row"><span>Simple ROI</span><span>${simpleROI.toFixed(1)}%</span></div>
                <div class="analysis-row"><span>Yield on Cost</span><span>${yieldOnCost.toFixed(1)}%</span></div>
            </div>
            
            <div class="section-title">💵 After-Tax Returns</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>ATCF (After-Tax CF)</span><span>${formatMoney(atcf)}/mo</span></div>
                <div class="analysis-row"><span>Capital Gain</span><span>${formatMoney(capitalGain)}</span></div>
            </div>
            
            <div class="section-title">⚠️ Risk Analysis</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>Break-Even Rent</span><span>${formatMoney(breakEvenRent)}/mo</span></div>
                <div class="analysis-row"><span>Occupancy Break-Even</span><span>${occupancyBreakEven.toFixed(0)}%</span></div>
                <div class="analysis-row"><span>Monthly Buffer</span><span style="color:${btcf > rent * 0.06 ? 'var(--success)':'var(--danger)'}">${btcf > rent * 0.06 ? '✅ Safe' : '⚠️ Tight'}</span></div>
            </div>
            
            ${safetyData ? `
            <div class="section-title">🛡️ Neighborhood Safety (FW Police Data)</div>
            <div class="analysis-section">
                <div class="analysis-row"><span>Neighborhood</span><span>${safetyData.name}</span></div>
                <div class="analysis-row"><span>Safety Score</span><span style="color:${safetyData.score >= 70 ? 'var(--success)':safetyData.score >= 55 ? 'var(--accent)':'var(--danger)'}">${safetyData.score}/100 (${safetyData.grade})</span></div>
                <div class="analysis-row"><span>Relevant Crimes/Year</span><span style="color:${safetyData.crimes < 200 ? 'var(--success)':safetyData.crimes < 300 ? 'var(--accent)':'var(--danger)'}">${safetyData.crimes}</span></div>
                <div class="analysis-row"><span>Crime Map</span><span><a href="https://www.doorprofit.com/crime-map/city/Fort_Worth-TX/" target="_blank" style="color:var(--primary)">View Full Map ↗</a></span></div>
            </div>
            ` : ''}
            
            <div class="action-buttons">
                <button class="action-btn secondary" onclick="closeModal()">Close</button>
                <button class="action-btn primary" onclick="alert('Opening Zillow...')">View on Zillow</button>
            </div>
        `;
        document.getElementById('propertyModal').classList.add('active');
    }
    function closeModal() { document.getElementById('propertyModal').classList.remove('active'); }
    renderTable();
    </script>
</body>
</html>
